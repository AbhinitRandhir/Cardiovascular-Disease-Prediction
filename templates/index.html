{% extends "base.html" %}
{% block content %}
<div class="card" style="text-align: center;">
    <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=1000&q=80" class="web-img" alt="Health Care">
    <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Welcome, {{ name }}!</h1>
    <p style="color: #666; font-size: 1.1rem; max-width: 600px; margin: 0 auto 2rem auto;">
        Your heart health is our priority. Use our advanced AI-driven diagnostics to monitor your risk levels and get personalized lifestyle recommendations.
    </p>
    
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="/predict" class="btn-primary" style="text-decoration: none; width: auto; padding: 15px 40px;">Start Checkup</a>
        <a href="/about" class="btn-primary" style="text-decoration: none; width: auto; padding: 15px 40px; background: #eee; color: #333;">Learn More</a>
    </div>
</div>
{% endblock %}
